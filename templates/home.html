{% extends "base.html" %}
{% block content %}
<article class="prose">
{{ content|safe }}
</article>
{% if posts %}
<section class="home-posts">
  <h2>Latest posts</h2>
  <ul class="post-list">
    {% for post in posts %}
    <li><span class="date">{{ post.date_iso }}</span> <a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
  </ul>
  <p><a href="/blog/">All posts →</a></p>
</section>
{% endif %}
{% endblock %}
